syntax = "proto3";
option csharp_namespace = "WordServer.Protos";

service Word {//DailyWord proto
	rpc GetWord(WordRequest) returns(WordResult);//GetWord RPC
	rpc ValidateWord(InputWord) returns(ValidationResult);//ValidateWord RPC
}

message WordRequest {//message for input for ValidateWord
	int64 date = 1;
}

message WordResult {//message for input for ValidateWord
	string word = 1;
}

message InputWord {//message for input for ValidateWord
	string word = 1;
}

message ValidationResult {//message for input for ValidateWord
	bool isValid = 1;
}



