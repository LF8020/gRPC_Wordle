syntax = "proto3";

option csharp_namespace = "WordleGameServer.Protos";

// The greeting service definition.
service Wordle {
  // Sends a greeting
  rpc GetStats(StatRequest) returns (UserStats);
  rpc Play(stream GuessedWord) returns (stream PlayValues);
}

message GuessedWord{
  string guess = 1; //guess is more describetive to me than word
}

message PlayValues{
  bool validGuess = 1; //valid word
  bool gameOver = 2; //is the game over
  bool gameWin = 3; //did the player win?
  int32 guessIndex = 4; //Which guess is this
  string guessAccuracy = 5; //string showing how close was the guess
  repeated string correctLetters = 6; //letters guessed correctly
  repeated string incorrectLetters = 7; //letters guessed incorrectly
  repeated string availableLetters = 8; //letters not guessed
  string message = 9; //message for player
}

message StatRequest{}

// The response message containing the user stats.
message UserStats {
  int32 numUsers = 1;
  float percentWon = 2;//for example, will be passed back as '80' instead of '0.8'
  repeated int32 guesses = 3;//array of ints (only 6 guesses so make sure the client reflects that)
}
